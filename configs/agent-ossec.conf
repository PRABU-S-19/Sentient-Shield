<!--
  Wazuh - Agent - Default configuration for ubuntu 24.04
  More info at: https://documentation.wazuh.com
  Mailing list: https://groups.google.com/forum/#!forum/wazuh
-->

<ossec_config>

  <client>
    <server>
      <address>192.168.56.104</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu24</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <logging>
    <log_format>plain</log_format>
  </logging>

  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <directories realtime="yes" report_changes="yes" check_all="yes">/tmp/test_ransomware</directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">/var/log</directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">/tmp</directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">/etc</directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">/usr/bin</directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">/usr/sbin</directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">/var/www/html</directories>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
  </rootcheck>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/myapp/app.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

</ossec_config>
